name: GEX snapshot (nightly EOD)

env:
  PYTHONUNBUFFERED: "1"

on:
  workflow_dispatch:
  schedule:
    # Mon-Fri 23:30 UTC (after US cash close)
    - cron: "30 23 * * 1-5"

concurrency:
  group: massive-api-${{ github.repository }}
  cancel-in-progress: false

jobs:
  gex-snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .

      - name: gex-refresh
        env:
          MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MASSIVE_RATE_PER_MIN: "4.0"
        run: gex-refresh --json
